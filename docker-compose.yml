version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: p2m_db
    environment:
      POSTGRES_DB: p2m_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]   
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    container_name: p2m_backend
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: p2m_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8000

  # NEW SERVICE ADDED HERE
  e2e:
      build:
        context: ./frontend
        dockerfile: Dockerfile.e2e
      container_name: p2m_playwright
      depends_on:
        - frontend
      environment:
        - PLAYWRIGHT_BASE_URL=http://frontend:3000

volumes:
  postgres_data: