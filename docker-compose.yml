version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: p2m_db
    environment:
      POSTGRES_DB: p2m_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]   
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    container_name: p2m_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/p2m_ecommerce
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: p2m_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8000

volumes:
  postgres_data:
